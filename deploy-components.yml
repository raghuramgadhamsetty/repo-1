parameters:
  - name: region
    type: string
  - name: owner
    type: string
  - name: branchName
    type: string
  - name: includeParse          # kept for compatibility, not used
    type: boolean
    default: true

steps:
  - task: PowerShell@2
    displayName: 'Deploy all components in ${{ parameters.region }}'
    env:
      GITHUB_TOKEN: $(GITHUB_TOKEN)
    inputs:
      targetType: 'inline'
      script: |
        $ErrorActionPreference = "Stop"

        $region = "${{ parameters.region }}"
        $owner  = "${{ parameters.owner }}"
        $branch = "${{ parameters.branchName }}"
        $infoFile = "$(Pipeline.Workspace)/ci-build-info/all-repos-build-info.txt"

        if (-not (Test-Path $infoFile)) {
          Write-Error "Info file not found: $infoFile"
        }

        # Load versions per repo from all-repos-build-info.txt
        $versions = @{}
        foreach ($line in Get-Content $infoFile) {
          $parts = $line -split ' - ', 2
          if ($parts.Count -ge 2) {
            $repo = $parts[0].Trim()
            $ver  = $parts[1].Trim()
            $versions[$repo] = $ver
          }
        }

        function Has-Version([string]$repo) {
          if (-not $versions.ContainsKey($repo)) { return $false }
          $v = $versions[$repo]
          return ($v -and $v -ne "" -and $v -ine "NA")
        }

        # Repo config: name + terraform flag variable
        $components = @(
          @{ Name = "mario_service";         TerraformVar = "mario_service_terraform" }
          @{ Name = "contra_app";            TerraformVar = "contra_app_terraform" }
          @{ Name = "bomber_man_service";    TerraformVar = "bomber_man_service_terraform" }
          @{ Name = "islander_app_service";  TerraformVar = "islander_app_service_terraform" }
          @{ Name = "cricket_app";           TerraformVar = "cricket_app_terraform" }
          @{ Name = "checkmate_checkers";    TerraformVar = "checkmate_checkers_terraform" }
          @{ Name = "baseball_game_service"; TerraformVar = "baseball_game_service_terraform" }
          @{ Name = "pokeman_game";          TerraformVar = "pokeman_game_terraform" }
          @{ Name = "popeye-service";        TerraformVar = "popeye_service_terraform" }
          @{ Name = "main_terraform";        TerraformVar = "" }
        )

        function Get-DeployInputs([string]$repo, [string]$region, [string]$version) {
          # Customize per component as needed. Return a hashtable or $null.
          switch ($repo) {
            "mario_service" {
              return @{
                environment    = $region
                packageVersion = $version
              }
            }
            "contra_app" {
              return @{
                slot           = "blue"
                trafficPercent = "20"
              }
            }
            "bomber_man_service" {
              return @{
                region   = $region
                buildTag = $version
              }
            }
            default {
              return $null
            }
          }
        }

        $baseUrl = "https://api.github.com"
        $token = $env:GITHUB_TOKEN
        if (-not $token) {
          Write-Error "GITHUB_TOKEN is not set."
        }
        $headers = @{
          Authorization = "token $token"
          Accept        = "application/vnd.github.v3+json"
        }

        function Get-TerraformEnabled([string]$varName) {
          if (-not $varName) { return $false }
          # Check environment variables for that name and uppercase version
          $val = (Get-Item -Path ("Env:" + $varName) -ErrorAction SilentlyContinue).Value
          if (-not $val) { $val = (Get-Item -Path ("Env:" + $varName.ToUpper()) -ErrorAction SilentlyContinue).Value }
          return ($val -eq "true")
        }

        function Invoke-Terraform([string]$repo) {
          Write-Host "Terraform for $repo in $region" -ForegroundColor Cyan

          try {
            $workflows = Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/workflows" -Headers $headers -Method Get
            $tfWf = $workflows.workflows | Where-Object { $_.path -like "*terraform.yml" -or $_.path -like "*terraform.yaml" } | Select-Object -First 1
            if (-not $tfWf) {
              Write-Host "Repo $repo : no terraform.yml/terraform.yaml workflow with workflow_dispatch." -ForegroundColor Red
              return "failure"
            }

            $body = @{ ref = $branch } | ConvertTo-Json
            Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/workflows/$($tfWf.id)/dispatches" -Headers $headers -Method Post -Body $body -ContentType "application/json"

            Write-Host "  Triggered terraform for $repo" -ForegroundColor Green
            Start-Sleep -Seconds 5

            $branchEncoded = [System.Uri]::EscapeDataString($branch)
            $runs = Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/workflows/$($tfWf.id)/runs?branch=$branchEncoded&per_page=5" -Headers $headers -Method Get
            $runId = $runs.workflow_runs[0].id

            do {
              Start-Sleep -Seconds 10
              $run = Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/runs/$runId" -Headers $headers -Method Get
              Write-Host "    $repo terraform status: $($run.status)"
            } while ($run.status -ne "completed")

            if ($run.conclusion -ne "success") {
              Write-Host "Terraform failed for $repo - $($run.conclusion)" -ForegroundColor Red
              return "failure"
            }

            Write-Host "  Terraform succeeded for $repo" -ForegroundColor Green
            return "success"
          }
          catch {
            Write-Host "Terraform failed for $repo - $($_.Exception.Message)" -ForegroundColor Red
            return "failure"
          }
        }

        # Track results
        $terraformResults = @{}   # repo -> success/failure
        $deployResults    = @{}   # repo -> GitHub conclusion

        # ============================ PHASE 1: Terraform ============================
        foreach ($c in $components) {
          $repo = $c.Name
          $tfVar = $c.TerraformVar
          if (Get-TerraformEnabled $tfVar) {
            $tfStatus = Invoke-Terraform $repo
            $terraformResults[$repo] = $tfStatus
          } else {
            if ($tfVar) {
              Write-Host "Terraform disabled for $repo (var '$tfVar' != true), skipping."
            }
          }
        }

        # ==================== PHASE 2: Trigger all deploys in GitHub ====================
        $deployRuns = @{}
        $branchEncoded = [System.Uri]::EscapeDataString($branch)

        foreach ($c in $components) {
          $repo = $c.Name

          if (-not (Has-Version $repo)) {
            Write-Host "$repo has no deployable version (NA / missing), skipping deploy." -ForegroundColor Yellow
            continue
          }
          $version = $versions[$repo]

          $workflows = Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/workflows" -Headers $headers -Method Get
          $deployWf = $workflows.workflows | Where-Object { $_.path -match "deploy\.(yaml|yml)$" } | Select-Object -First 1
          if (-not $deployWf) {
            Write-Host "Repo $repo : no deploy.yaml/yml workflow with workflow_dispatch." -ForegroundColor Red
            $deployResults[$repo] = "no_workflow"
            continue
          }

          # Optional workflow_dispatch inputs per component
          $inputs = Get-DeployInputs -repo $repo -region $region -version $version
          $body = @{
            ref = $branch
          }
          if ($inputs -ne $null) {
            $body.inputs = $inputs
          }
          $bodyJson = $body | ConvertTo-Json -Depth 10

          Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/workflows/$($deployWf.id)/dispatches" -Headers $headers -Method Post -Body $bodyJson -ContentType "application/json"

          Write-Host "Triggered deploy for $repo ($version) - $region" -ForegroundColor Green
          Start-Sleep -Seconds 5

          $runs = Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/workflows/$($deployWf.id)/runs?branch=$branchEncoded&per_page=5" -Headers $headers -Method Get
          $runId = $runs.workflow_runs[0].id
          $deployRuns[$repo] = @{ RunId = $runId; Version = $version }
        }

        if ($deployRuns.Count -eq 0) {
          Write-Host "No components to deploy in $region (no usable versions)." -ForegroundColor Yellow
        } else {
          # ================= PHASE 3: Wait for all deploys to finish =================
          while ($deployRuns.Count -gt 0) {
            foreach ($repo in @($deployRuns.Keys)) {
              $runId = $deployRuns[$repo].RunId
              $run   = Invoke-RestMethod -Uri "$baseUrl/repos/$owner/$repo/actions/runs/$runId" -Headers $headers -Method Get
              Write-Host "  $repo deploy status: $($run.status)"

              if ($run.status -eq "completed") {
                $deployResults[$repo] = $run.conclusion

                if ($run.conclusion -ne "success") {
                  Write-Host "Deploy failed for $repo - $($run.conclusion)" -ForegroundColor Red
                } else {
                  Write-Host "Deploy succeeded for $repo" -ForegroundColor Green
                }

                $deployRuns.Remove($repo)
              }
            }

            if ($deployRuns.Count -gt 0) {
              Start-Sleep -Seconds 10
            }
          }
        }

        # ======================== Deployment summary (per repo) ========================
        Write-Host ""
        Write-Host "================ Deployment summary for region: $region =================="

        # Terraform summary: only show repos where terraform actually ran (success or failure)
        Write-Host ""
        Write-Host "---- Terraform components ----"
        foreach ($repo in $terraformResults.Keys) {
          $tfStatusRaw = $terraformResults[$repo]
          switch ($tfStatusRaw.ToLowerInvariant()) {
            "success" { $tfStatus = "Success" }
            default   { $tfStatus = "Failure ($tfStatusRaw)" }
          }
          Write-Host ("Component: {0}_terraform | Status: {1}" -f $repo, $tfStatus)
        }

        # Application deploy summary (only real versions, no NA/skipped)
        Write-Host ""
        Write-Host "---- Application components ----"
        foreach ($c in $components) {
          $repo = $c.Name

          if (-not (Has-Version $repo)) { continue }  # skip NA / missing

          $version = $versions[$repo]
          $statusRaw = if ($deployResults.ContainsKey($repo)) { $deployResults[$repo] } else { "unknown" }

          switch ($statusRaw.ToLowerInvariant()) {
            "success" { $status = "Success" }
            default   { $status = "Failure ($statusRaw)" }
          }

          Write-Host ("Component: {0} | Version: {1} | Status: {2}" -f $repo, $version, $status)
        }

        # Fail the job if any terraform or app deploy failed
        $anyTfFail  = $terraformResults.Values | Where-Object { $_ -ne "success" }
        $anyAppFail = $deployResults.Values    | Where-Object { $_ -ne "success" }
        if ($anyTfFail -or $anyAppFail) {
          Write-Error "One or more terraform or component deploys failed. See summary above."
        }
